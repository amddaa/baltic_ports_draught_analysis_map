<!DOCTYPE html>
<html>
<head>
    <title>Port Analytics Dashboard</title>
    <meta charset="utf-8" />
    <script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; display: flex; flex-direction: column; height: 100vh; background: #f8fafc; color: #334155; overflow: hidden; user-select: text; }
        .app-bar { background: #0f172a; padding: 0 32px; display: flex; align-items: center; height: 64px; flex-shrink: 0; z-index: 2000; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .app-bar .brand { color: #f1f5f9; font-weight: 700; font-size: 18px; display: flex; align-items: center; gap: 12px; margin-right: 32px; white-space: nowrap; }
        .app-bar .brand i { color: #3b82f6; }
        .app-nav { display: flex; gap: 2px; flex: 1; height: 100%; align-items: center; }
        .app-nav a { color: #94a3b8; text-decoration: none; font-size: 14px; font-weight: 500; padding: 0 16px; height: 100%; display: flex; align-items: center; border-bottom: 2px solid transparent; transition: all 0.15s; }
        .app-nav a:hover { color: #f1f5f9; background: rgba(255, 255, 255, 0.05); }
        .app-nav a.active { color: #ffffff; border-bottom-color: #3b82f6; }
        .main-container { display: flex; flex: 1; overflow: hidden; }
        #sidebar { width: 400px; background: #fff; display: flex; flex-direction: column; box-shadow: 4px 0 24px -4px rgba(0,0,0,0.1); z-index: 1000; flex-shrink: 0; overflow: hidden; }
        .header { padding: 20px 32px; border-bottom: 1px solid #e2e8f0; }
        .header h1 { font-size: 18px; font-weight: 700; color: #0f172a; }
        .section-header { padding: 12px 32px 6px; font-size: 10px; text-transform: uppercase; color: #94a3b8; font-weight: 600; letter-spacing: 0.5px; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 0 32px 12px; }
        .btn { padding: 8px; background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; color: #64748b; font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 4px; }
        .btn.active { background: #0f172a; border-color: #0f172a; color: #fff; }
        .controls { padding: 20px 32px; flex: 1; overflow-y: auto; border-top: 1px solid #e2e8f0; }
        .profile-desc { font-size: 11px; color: #64748b; line-height: 1.5; background: #f0f9ff; padding: 10px; border-radius: 6px; border-left: 3px solid #3b82f6; margin-bottom: 16px; }
        .search-container { margin-bottom: 16px; position: relative; }
        .search-input { width: 100%; padding: 8px 12px 8px 32px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 12px; }
        .search-icon { position: absolute; left: 10px; top: 10px; color: #94a3b8; }
        .content { flex: 1; display: flex; flex-direction: column; background: #f8fafc; padding: 20px; overflow: hidden; }
        .chart-card { background: white; border-radius: 12px; border: 1px solid #e2e8f0; flex: 1; display: flex; flex-direction: column; padding: 8px; overflow: hidden; }
        #chart { flex: 1; width: 100%; height: 100%; }
        .footer { padding: 12px 32px; border-top: 1px solid #e2e8f0; font-size: 10px; color: #94a3b8; text-align: center; }

        /* --- JS FLOATING TOOLTIP --- */
        .feat-tile { font-size: 10px; padding: 3px 7px; background: #f1f5f9; border-radius: 4px; color: #475569; border: 1px solid #e2e8f0; cursor: help; transition: all 0.2s; }
        .feat-tile:hover { background: #e2e8f0; color: #0f172a; border-color: #cbd5e1; }
        #global-tooltip { position: fixed; background: #1e293b; color: #fff; padding: 12px; border-radius: 8px; font-size: 11px; line-height: 1.4; width: 240px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); pointer-events: none; opacity: 0; visibility: hidden; transition: opacity 0.1s; z-index: 10000; }
    </style>
</head>
<body>
<div id="global-tooltip"></div>
<div class="app-bar">
    <div class="brand"><i data-lucide="anchor"></i> Baltic AIS Analytics</div>
    <nav class="app-nav">
        <a href="index.html">Home</a>
        <a href="routes_map.html">Route Analysis</a>
        <a href="port_dashboard.html" class="active">Port Profiles</a>
    </nav>
</div>
<div class="main-container">
<div id="sidebar">
    <div class="header"><h1>Port Similarity & Map</h1></div>
    
    <div class="section-header">Analysis Category</div>
    <div class="btn-grid"><button id="p_fleet_mix" class="btn active" onclick="setProfile('fleet_mix')"><i data-lucide="ship"></i> Fleet Mix</button><button id="p_operations" class="btn " onclick="setProfile('operations')"><i data-lucide="clock"></i> Operations</button><button id="p_scale" class="btn " onclick="setProfile('scale')"><i data-lucide="maximize"></i> Vessel Scale</button><button id="p_infrastructure" class="btn " onclick="setProfile('infrastructure')"><i data-lucide="anchor"></i> Infrastructure</button></div>
    
    <div class="section-header">View Projection</div>
    <div class="btn-grid">
        <button id="v2d" class="btn" onclick="setView('2d')"><i data-lucide="layout"></i> 2D PCA</button>
        <button id="v3d" class="btn" onclick="setView('3d')"><i data-lucide="box"></i> 3D PCA</button>
        <button id="vmap" class="btn active" onclick="setView('map')"><i data-lucide="map"></i> Map View</button>
        <button id="vcorr" class="btn" onclick="setView('corr')"><i data-lucide="grid"></i> Correlation</button>
    </div>
    
    <div class="section-header">Color By</div>
    <div class="btn-grid">
        <button id="c_dominant" class="btn" onclick="setColorMode('dominant')"><i data-lucide="tag"></i> Dominant Type</button>
        <button id="c_cluster" class="btn active" onclick="setColorMode('cluster')"><i data-lucide="pie-chart"></i> Profile Cluster</button>
    </div>

    <div class="controls">
        <div id="cluster-metrics" style="margin-bottom: 16px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 12px; font-size: 11px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
                <span style="font-weight: 600; color: #475569;">Optimal Clusters (K)</span>
                <span id="opt-k" style="font-weight: 700; color: #0f172a; font-size: 14px;"></span>
            </div>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                <span style="font-weight: 600; color: #475569;">Silhouette Score</span>
                <span id="sil-score" style="font-weight: 700; color: #0f172a; font-size: 14px;"></span>
            </div>
        </div>

        <div id="search-box" class="search-container">
            <i data-lucide="search" class="search-icon" style="width:14px; height:14px;"></i>
            <input type="text" id="portSearch" class="search-input" placeholder="Search port..." onkeyup="filter()">
        </div>
        <div id="active-features">
            <h3 style="font-size: 10px; text-transform: uppercase; color: #94a3b8; margin-bottom: 8px;">Active Features</h3>
            <div id="cols-container" style="display:flex; flex-wrap:wrap; gap:4px;"></div>
        </div>
    </div>
    <div class="footer">Total Variance: <span id="total-var">0</span>%</div>
</div>
<div class="content"><div class="chart-card"><div id="chart"></div></div></div>
</div>

quartile range (75th - 25th percentile) of stay durations. Indicates variability.", "pct_short_stay": "<b>Source:</b> <code>port_visits</code> table (`stay_duration_hours`).<br><b>Calc:</b> Percentage of visits lasting < 6 hours.", "pct_long_stay": "<b>Source:</b> <code>port_visits</code> table (`stay_duration_hours`).<br><b>Calc:</b> Percentage of visits lasting > 48 hours.", "repeat_visitor_ratio": "<b>Source:</b> <code>port_visits</code> table (`mmsi`).<br><b>Calc:</b> (Vessels with >1 visit) / (Total unique vessels).", "avg_visits_per_vessel": "<b>Source:</b> <code>port_visits</code> table (`mmsi`).<br><b>Calc:</b> (Total visits) / (Total unique vessels).", "mean_length_m": "<b>Source:</b> <code>port_visits</code> table (`length_m`).<br><b>Calc:</b> Average length of unique visiting vessels.", "median_length_m": "<b>Source:</b> <code>port_visits</code> table (`length_m`).<br><b>Calc:</b> Median length of unique visiting vessels.", "mean_draught_m": "<b>Source:</b> <code>port_visits</code> table (`draught_m`).<br><b>Calc:</b> Average reported draught of visiting vessels.", "median_draught_m": "<b>Source:</b> <code>port_visits</code> table (`draught_m`).<br><b>Calc:</b> Median reported draught of visiting vessels.", "harbor_size_int": "<b>Source:</b> <code>ports</code> table (`harbor_size`).<br><b>Calc:</b> Encoded categorical size (1: Very Small, 5: Large).", "shelter_afforded_int": "<b>Source:</b> <code>ports</code> table (`shelter_afforded`).<br><b>Calc:</b> Encoded shelter quality (1: Poor, 4: Excellent).", "channel_depth_m": "<b>Source:</b> <code>ports</code> table (`channel_depth_m`).<br><b>Calc:</b> Max depth (m) in main entrance channel.", "anchorage_depth_m": "<b>Source:</b> <code>ports</code> table (`anchorage_depth_m`).<br><b>Calc:</b> Depth (m) of the primary anchorage area.", "cargo_pier_depth_m": "<b>Source:</b> <code>ports</code> table (`cargo_pier_depth_m`).<br><b>Calc:</b> Max depth (m) at cargo piers."};
    
    let currentProfile = 'fleet_mix';
    let currentView = 'map';
    let colorMode = 'cluster';
    let searchTerm = '';
    
    const tooltip = document.getElementById('global-tooltip');
    const clusterPalette = ['#f43f5e', '#8b5cf6', '#06b6d4', '#eab308'];

    function setProfile(p) {
        currentProfile = p;
        Object.keys(profiles).forEach(k => {
            const el = document.getElementById('p_'+k);
            if (el) el.classList.toggle('active', k === p);
        });
        document.getElementById('opt-k').innerText = pcaData[p].optimal_k;
        document.getElementById('sil-score').innerText = pcaData[p].silhouette_score;
        renderFeatureList();
        render();
    }

    function setView(v) {
        currentView = v;
        ['v2d', 'v3d', 'vmap', 'vcorr'].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.classList.toggle('active', id === 'v'+v);
        });
        document.getElementById('search-box').style.display = v === 'corr' ? 'none' : 'block';
        
        // Disable color toggling for correlation matrix
        const colorToggles = [document.getElementById('c_dominant'), document.getElementById('c_cluster')];
        colorToggles.forEach(el => {
            if (el) {
                el.style.opacity = v === 'corr' ? '0.5' : '1';
                el.style.pointerEvents = v === 'corr' ? 'none' : 'auto';
            }
        });
        
        render();
    }

    function setColorMode(mode) {
        colorMode = mode;
        document.getElementById('c_dominant').classList.toggle('active', mode === 'dominant');
        document.getElementById('c_cluster').classList.toggle('active', mode === 'cluster');
        render();
    }

    function renderFeatureList() {
        document.getElementById('cols-container').innerHTML = profiles[currentProfile].cols.map(c => {
            const doc = featureDocs[c] || "Detailed documentation unavailable.";
            return `<div class="feat-tile" onmouseenter="showTooltip(event, '${doc}')" onmouseleave="hideTooltip()" onmousemove="moveTooltip(event)">${c}</div>`;
        }).join('');
    }

    function showTooltip(e, text) { tooltip.innerHTML = text; tooltip.style.visibility = 'visible'; tooltip.style.opacity = '1'; moveTooltip(e); }
    function hideTooltip() { tooltip.style.visibility = 'hidden'; tooltip.style.opacity = '0'; }
    function moveTooltip(e) {
        let x = e.clientX + 15; let y = e.clientY + 15;
        if (x + 250 > window.innerWidth) x = e.clientX - 260;
        if (y + 100 > window.innerHeight) y = e.clientY - 120;
        tooltip.style.left = x + 'px'; tooltip.style.top = y + 'px';
    }

    function filter() { searchTerm = document.getElementById('portSearch').value.toLowerCase(); render(); }

    function render() {
        const pData = pcaData[currentProfile];
        const config = { responsive: true, displayModeBar: true, scrollZoom: true };
        
        // Early return for Correlation View
        if (currentView === 'corr') {
            const trace = { z: pData.corr.z, x: pData.corr.x, y: pData.corr.y, type: 'heatmap', colorscale: [[0, '#ef4444'], [0.5, '#ffffff'], [1, '#3b82f6']], zmin: -1, zmax: 1, hovertemplate: 'X: %{x}<br>Y: %{y}<br>Corr: <b>%{z}</b><extra></extra>' };
            const layout = { title: { text: profiles[currentProfile].label + ' Correlation Matrix', font: { family: 'Inter', size: 14, weight: 700 } }, margin: { l: 120, r: 20, t: 80, b: 120 }, paper_bgcolor: 'white', plot_bgcolor: 'white' };
            Plotly.react('chart', [trace], layout, config);
            document.getElementById('total-var').innerText = "100";
            return;
        }

        // Filter ports
        const filteredPorts = ports.filter(p => p.name.toLowerCase().includes(searchTerm) || p.id.toLowerCase().includes(searchTerm) || p.country.toLowerCase().includes(searchTerm) || p.dominant.toLowerCase().includes(searchTerm));
        const maxVisits = Math.max(...ports.map(p => p.visits));

        // Group ports by active Color Mode
        const groups = {};
        filteredPorts.forEach(p => {
            let gName = '';
            let gColor = '';
            if (colorMode === 'dominant') {
                gName = p.dominant;
                gColor = p.color;
            } else {
                const origIdx = ports.indexOf(p);
                const cId = pData.clusters[origIdx];
                gName = pData.cluster_names[cId];
                gColor = clusterPalette[cId % clusterPalette.length];
            }
            
            if (!groups[gName]) groups[gName] = { ports: [], color: gColor };
            groups[gName].ports.push(p);
        });

        const groupKeys = Object.keys(groups).sort();

        // Build traces
        const traces = groupKeys.map(t => {
            const tPorts = groups[t].ports;
            const tColor = groups[t].color;
            const indices = tPorts.map(p => ports.indexOf(p));
            
            const base = {
                name: t, text: tPorts.map(p => p.id), mode: 'markers',
                marker: { size: tPorts.map(p => Math.sqrt(p.visits / maxVisits) * 40 + 5), color: tColor, opacity: 0.7, line: { width: 0.5, color: '#fff' } },
                customdata: tPorts.map(p => {
                    // Fetch cluster name for tooltip
                    const origIdx = ports.indexOf(p);
                    const cId = pData.clusters[origIdx];
                    const clusterName = pData.cluster_names[cId];
                    
                    const activeCols = profiles[currentProfile].cols;
                    const featsText = activeCols.map(col => {
                        let val = p.raw_features[col];
                        let label = col.replace('pct_', '').replace('_m', ' (m)').replace('_h', ' (h)').replace('_int', '').replace(/_/g, ' ');
                        label = label.charAt(0).toUpperCase() + label.slice(1);
                        if (col.startsWith('pct_') && p.raw_features[col + '_count'] !== undefined) {
                            return `<b>${label}</b>: ${val}% (${p.raw_features[col + '_count']})`;
                        }
                        return `<b>${label}</b>: ${val}`;
                    }).join('<br>');
                    
                    return [p.name, p.visits.toLocaleString(), p.dominant, clusterName, featsText];
                }),
                hovertemplate: '<b>%{text} - %{customdata[0]}</b><br>Cluster: <b>%{customdata[3]}</b><br>Visits: %{customdata[1]}<br>Dominant: %{customdata[2]}<br><br><b>Active Features:</b><br>%{customdata[4]}<extra></extra>'
            };

            if (currentView === 'map') {
                base.type = 'scattermapbox';
                base.lat = tPorts.map(p => p.lat);
                base.lon = tPorts.map(p => p.lon);
                base.marker.size = tPorts.map(p => Math.sqrt(p.visits / maxVisits) * 25 + 4);
            } else if (currentView === '3d') {
                base.type = 'scatter3d';
                base.x = indices.map(i => pData.coords[i][0]);
                base.y = indices.map(i => pData.coords[i][1]);
                base.z = indices.map(i => pData.coords[i][2]);
            } else {
                base.type = 'scatter';
                base.x = indices.map(i => pData.coords[i][0]);
                base.y = indices.map(i => pData.coords[i][1]);
            }
            return base;
        });

        const chartDiv = document.getElementById('chart');
        let currentMapbox = {
            style: 'white-bg',
            layers: [{ sourcetype: 'raster', source: ['https://a.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}@2x.png'], below: 'traces' }],
            center: { lat: 55, lon: 18 }, zoom: 4
        };
        let currentScene = { xaxis: { title: 'PC1' }, yaxis: { title: 'PC2' }, zaxis: { title: 'PC3' } };

        if (chartDiv && chartDiv.layout) {
            if (chartDiv.layout.mapbox) {
                currentMapbox.center = chartDiv.layout.mapbox.center || currentMapbox.center;
                currentMapbox.zoom = chartDiv.layout.mapbox.zoom || currentMapbox.zoom;
            }
            if (chartDiv.layout.scene && chartDiv.layout.scene.camera) {
                currentScene.camera = chartDiv.layout.scene.camera;
            }
        }

        const layout = {
            margin: { l: 50, r: 20, t: 80, b: (currentView === '2d' || currentView === 'map') ? 80 : 20 },
            hovermode: 'closest', paper_bgcolor: 'white', plot_bgcolor: 'white',
            title: { text: profiles[currentProfile].label + ' Analysis', font: { family: 'Inter', size: 14, weight: 700 }, x: 0.05, y: 0.95 },
            legend: { orientation: 'h', y: (currentView === '2d' || currentView === 'map') ? -0.15 : 0, x: 0.5, xanchor: 'center' },
            xaxis: { title: 'PC1 ('+pData.variance[0]+'%)', gridcolor: '#f1f5f9', zeroline: false },
            yaxis: { title: 'PC2 ('+pData.variance[1]+'%)', gridcolor: '#f1f5f9', zeroline: false },
            scene: currentScene,
            mapbox: currentMapbox
        };

        document.getElementById('total-var').innerText = currentView === 'map' ? 'N/A' : (pData.variance[0] + pData.variance[1] + (currentView === '3d' ? pData.variance[2] : 0)).toFixed(1);
        Plotly.react('chart', traces, layout, config);
    }
    
    setProfile('fleet_mix');
    window.addEventListener('resize', () => Plotly.Plots.resize('chart'));
</script>
</body>
</html>
