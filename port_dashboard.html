<!DOCTYPE html>
<html>
<head>
    <title>Port Analytics Dashboard</title>
    <meta charset="utf-8" />
    <script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; display: flex; flex-direction: column; height: 100vh; background: #f8fafc; color: #334155; overflow: hidden; user-select: text; }
        .app-bar { background: #0f172a; padding: 0 32px; display: flex; align-items: center; height: 48px; flex-shrink: 0; z-index: 2000; }
        .app-bar .brand { color: #f1f5f9; font-weight: 700; font-size: 14px; display: flex; align-items: center; gap: 8px; }
        .main-container { display: flex; flex: 1; overflow: hidden; }
        #sidebar { width: 400px; background: #fff; display: flex; flex-direction: column; box-shadow: 4px 0 24px -4px rgba(0,0,0,0.1); z-index: 1000; flex-shrink: 0; }
        .header { padding: 20px 32px; border-bottom: 1px solid #e2e8f0; }
        .header h1 { font-size: 18px; font-weight: 700; color: #0f172a; }
        .section-header { padding: 12px 32px 6px; font-size: 10px; text-transform: uppercase; color: #94a3b8; font-weight: 600; letter-spacing: 0.5px; }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 0 32px 12px; }
        .btn-tri { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; padding: 0 32px 12px; }
        .btn { padding: 8px; background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; color: #64748b; font-size: 11px; font-weight: 600; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 4px; }
        .btn.active { background: #0f172a; border-color: #0f172a; color: #fff; }
        .controls { padding: 20px 32px; flex: 1; overflow-y: auto; border-top: 1px solid #e2e8f0; }
        .search-container { margin-bottom: 16px; position: relative; }
        .search-input { width: 100%; padding: 8px 12px 8px 32px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 12px; }
        .search-icon { position: absolute; left: 10px; top: 10px; color: #94a3b8; }
        .profile-desc { font-size: 11px; color: #64748b; line-height: 1.5; background: #f0f9ff; padding: 10px; border-radius: 6px; border-left: 3px solid #3b82f6; margin-bottom: 16px; }
        .content { flex: 1; display: flex; flex-direction: column; background: #f8fafc; padding: 20px; overflow: hidden; }
        .chart-card { background: white; border-radius: 12px; border: 1px solid #e2e8f0; flex: 1; display: flex; flex-direction: column; padding: 8px; overflow: hidden; }
        #chart { flex: 1; width: 100%; height: 100%; }
        .footer { padding: 12px 32px; border-top: 1px solid #e2e8f0; font-size: 10px; color: #94a3b8; text-align: center; }
    </style>
</head>
<body>
<div class="app-bar"><div class="brand"><i data-lucide="anchor"></i> Baltic Analytics</div></div>
<div class="main-container">
<div id="sidebar">
    <div class="header"><h1>Port Similarity & Correlation</h1></div>
    <div class="section-header">Analysis Category</div>
    <div class="btn-grid"><button id="p_fleet_mix" class="btn active" onclick="setProfile('fleet_mix')"><i data-lucide="ship"></i> Fleet Mix</button>
<button id="p_operations" class="btn " onclick="setProfile('operations')"><i data-lucide="clock"></i> Operations</button>
<button id="p_scale" class="btn " onclick="setProfile('scale')"><i data-lucide="maximize"></i> Vessel Scale</button>
<button id="p_infrastructure" class="btn " onclick="setProfile('infrastructure')"><i data-lucide="anchor"></i> Infrastructure</button>
</div>
    <div class="section-header">View Projection</div>
    <div class="btn-tri">
        <button id="v2d" class="btn active" onclick="setView('2d')">2D PCA</button>
        <button id="v3d" class="btn" onclick="setView('3d')">3D PCA</button>
        <button id="vcorr" class="btn" onclick="setView('corr')">Correlation</button>
    </div>
    <div class="controls">
        <div id="p-desc" class="profile-desc">Similarity based on the distribution of vessel types visiting the port.</div>
        <div id="search-box" class="search-container">
            <i data-lucide="search" class="search-icon" style="width:14px; height:14px;"></i>
            <input type="text" id="portSearch" class="search-input" placeholder="Search port..." onkeyup="filter()">
        </div>
        <div id="active-features">
            <h3 style="font-size: 10px; text-transform: uppercase; color: #94a3b8; margin-bottom: 6px;">Features</h3>
            <div id="cols-container" style="display:flex; flex-wrap:wrap; gap:4px;"></div>
        </div>
    </div>
    <div class="footer">Total Variance: <span id="total-var">0</span>%</div>
</div>
<div class="content"><div class="chart-card"><div id="chart"></div></div></div>
</div>

    const profiles = {"fleet_mix": {"label": "Fleet Mix", "icon": "ship", "cols": ["pct_cargo", "pct_tanker", "pct_passenger", "pct_fishing", "pct_hsc", "pct_sailing", "pct_tug", "pct_dredging", "pct_towing", "pct_pilot", "pct_sar", "pct_other"], "desc": "Similarity based on the distribution of vessel types visiting the port."}, "operations": {"label": "Operations", "icon": "clock", "cols": ["median_stay_h", "stay_iqr_h", "pct_short_stay", "pct_long_stay", "repeat_visitor_ratio", "avg_visits_per_vessel"], "desc": "Focus on stay patterns, handling efficiency, and vessel loyalty."}, "scale": {"label": "Vessel Scale", "icon": "maximize", "cols": ["mean_length_m", "median_length_m", "mean_draught_m", "median_draught_m"], "desc": "Similarity in the physical dimensions (size and depth) of visiting vessels."}, "infrastructure": {"label": "Infrastructure", "icon": "anchor", "cols": ["harbor_size_int", "shelter_afforded_int", "channel_depth_m", "anchorage_depth_m", "cargo_pier_depth_m"], "desc": "Comparison based on WPI physical characteristics and capacity."}};
    let currentProfile = 'fleet_mix';
    let currentView = '2d';
    let searchTerm = '';

    function setProfile(p) {
        currentProfile = p;
        Object.keys(profiles).forEach(k => {
            const el = document.getElementById('p_'+k);
            if (el) el.classList.toggle('active', k === p);
        });
        document.getElementById('p-desc').innerText = profiles[p].desc;
        renderFeatureList();
        render();
    }

    function setView(v) {
        currentView = v;
        document.getElementById('v2d').classList.toggle('active', v === '2d');
        document.getElementById('v3d').classList.toggle('active', v === '3d');
        document.getElementById('vcorr').classList.toggle('active', v === 'corr');
        document.getElementById('search-box').style.display = v === 'corr' ? 'none' : 'block';
        render();
    }

    function renderFeatureList() {
        document.getElementById('cols-container').innerHTML = profiles[currentProfile].cols.map(c => 
            `<div style="font-size: 10px; padding: 2px 6px; background: #f1f5f9; border-radius: 4px; color: #475569;">${c}</div>`
        ).join('');
    }

    function filter() {
        searchTerm = document.getElementById('portSearch').value.toLowerCase();
        render();
    }

    function render() {
        const pData = pcaData[currentProfile];
        const config = { responsive: true, displayModeBar: true, scrollZoom: true };
        
        if (currentView === 'corr') {
            const trace = {
                z: pData.corr.z,
                x: pData.corr.x,
                y: pData.corr.y,
                type: 'heatmap',
                colorscale: [[0, '#ef4444'], [0.5, '#ffffff'], [1, '#3b82f6']],
                zmin: -1, zmax: 1,
                hovertemplate: 'X: %{x}<br>Y: %{y}<br>Corr: <b>%{z}</b><extra></extra>'
            };
            const layout = {
                title: { text: profiles[currentProfile].label + ' Correlation Matrix', font: { family: 'Inter', size: 14, weight: 700 } },
                margin: { l: 120, r: 20, t: 80, b: 120 },
                paper_bgcolor: 'white',
                plot_bgcolor: 'white'
            };
            Plotly.react('chart', [trace], layout, config);
            document.getElementById('total-var').innerText = "100";
            return;
        }

        const filteredPorts = ports.filter(p => p.name.toLowerCase().includes(searchTerm) || p.id.toLowerCase().includes(searchTerm) || p.country.toLowerCase().includes(searchTerm) || p.dominant.toLowerCase().includes(searchTerm));
        const types = [...new Set(filteredPorts.map(p => p.dominant))].sort();
        const maxVisits = Math.max(...ports.map(p => p.visits));

        const traces = types.map(t => {
            const tPorts = filteredPorts.filter(p => p.dominant === t);
            const indices = tPorts.map(p => ports.indexOf(p));
            const base = {
                name: t,
                x: indices.map(i => pData.coords[i][0]),
                y: indices.map(i => pData.coords[i][1]),
                text: tPorts.map(p => p.id),
                mode: 'markers',
                marker: {
                    size: tPorts.map(p => Math.sqrt(p.visits / maxVisits) * 40 + 5),
                    color: tPorts[0].color,
                    opacity: 0.7,
                    line: { width: 0.5, color: '#fff' }
                },
                customdata: tPorts.map(p => [p.name, p.visits.toLocaleString(), p.dominant, p.stay, p.length, Object.entries(p.pct_mix).sort((a,b) => b[1]-a[1]).map(([k,v]) => k+': '+v+'%').join('<br>')]),
                hovertemplate: '<b>%{text} - %{customdata[0]}</b><br>Visits: %{customdata[1]}<br>Dominant: %{customdata[2]}<br>Avg Length: %{customdata[4]}<br>Med Stay: %{customdata[3]}<br><br><b>Mix:</b><br>%{customdata[5]}<extra></extra>'
            };
            if (currentView === '3d') {
                base.type = 'scatter3d';
                base.z = indices.map(i => pData.coords[i][2]);
            } else {
                base.type = 'scatter';
            }
            return base;
        });

        const totalVar = (pData.variance[0] + pData.variance[1] + (currentView === '3d' ? pData.variance[2] : 0)).toFixed(1);
        document.getElementById('total-var').innerText = totalVar;

        const layout = {
            margin: { l: 50, r: 20, t: 80, b: currentView === '2d' ? 80 : 20 },
            hovermode: 'closest',
            paper_bgcolor: 'white',
            plot_bgcolor: 'white',
            title: { text: profiles[currentProfile].label + ' Similarity Space', font: { family: 'Inter', size: 14, weight: 700 }, x: 0.05, y: 0.95 },
            legend: { orientation: 'h', y: currentView === '2d' ? -0.15 : 0, x: 0.5, xanchor: 'center' },
            xaxis: { title: 'PC1 ('+pData.variance[0]+'%)', gridcolor: '#f1f5f9', zeroline: false },
            yaxis: { title: 'PC2 ('+pData.variance[1]+'%)', gridcolor: '#f1f5f9', zeroline: false },
            scene: { xaxis: { title: 'PC1' }, yaxis: { title: 'PC2' }, zaxis: { title: 'PC3' } }
        };
        Plotly.react('chart', traces, layout, config);
    }

    setProfile('fleet_mix');
    window.addEventListener('resize', () => Plotly.Plots.resize('chart'));
</script>
