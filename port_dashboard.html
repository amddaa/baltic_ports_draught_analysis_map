<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Port Analytics Dashboard</title>
<script src="https://cdn.plot.ly/plotly-2.30.0.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#f8fafc;color:#334155;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ── Top app-bar (shared across pages) ── */
.app-bar{background:#0f172a;padding:0 32px;display:flex;align-items:center;gap:0;height:48px;flex-shrink:0;z-index:200}
.app-bar .brand{color:#f1f5f9;font-weight:700;font-size:14px;letter-spacing:-.3px;display:flex;align-items:center;gap:8px;margin-right:32px;white-space:nowrap}
.app-bar .brand span{color:#3b82f6}
.app-nav{display:flex;gap:2px;flex:1}
.app-nav a{color:#94a3b8;text-decoration:none;font-size:13px;font-weight:500;padding:0 14px;height:48px;display:flex;align-items:center;border-bottom:2px solid transparent;transition:all .15s}
.app-nav a:hover{color:#f1f5f9;background:rgba(255,255,255,.05)}
.app-nav a.active{color:#ffffff;border-bottom-color:#3b82f6}

.main-container {display:flex;flex:1;overflow:hidden;}

/* ── Sidebar ── */
#sidebar {
    width: 400px;
    background: #ffffff;
    display: flex;
    flex-direction: column;
    box-shadow: 4px 0 24px -4px rgba(0, 0, 0, 0.1);
    z-index: 100;
}

.header {padding: 24px 32px; background: #ffffff; border-bottom: 1px solid #e2e8f0;}
.header-main {display: flex; align-items: center; gap: 12px; margin-bottom: 6px;}
.header h1 {font-size: 20px; font-weight: 700; color: #0f172a; letter-spacing: -0.5px; margin: 0;}
.header .subtitle {font-size: 13px; color: #64748b; font-weight: 400; line-height:1.4}

/* ── View Selector (Nav tabs) ── */
.view-selector {
    padding: 16px 32px;
    background: #f8fafc;
    border-bottom: 1px solid #e2e8f0;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
}
.view-btn {
    padding: 10px;
    background: #ffffff;
    border: 1px solid #e2e8f0;
    border-radius: 10px;
    color: #64748b;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
}
.view-btn:hover {background: #f1f5f9; border-color: #cbd5e1; color: #334155;}
.view-btn.active {background: #0f172a; border-color: #0f172a; color: #ffffff;}

/* ── Stats row ── */
.stats-row {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
    padding: 24px 32px;
    background: #ffffff;
    overflow-y: auto;
    flex: 1;
    align-content: start;
}
.stat-card {
    text-align: center;
    padding: 16px 12px;
    background: #f8fafc;
    border-radius: 12px;
    border: 1px solid #e2e8f0;
    transition: transform 0.2s;
}
.stat-card:hover {transform: translateY(-2px); border-color: #cbd5e1;}
.stat-value {font-size: 22px; font-weight: 700; color: #0f172a;}
.stat-label {font-size: 11px; color: #64748b; text-transform: uppercase; margin-top: 6px; font-weight: 600; letter-spacing: 0.5px;}

/* ── Content Area ── */
.content {flex: 1; padding: 32px; background: #e2e8f0; overflow-y: auto;}
.section {display: none; animation: fadeIn .25s ease;}
.section.active {display: block;}
@keyframes fadeIn {from {opacity: 0; transform: translateY(6px);} to {opacity: 1; transform: translateY(0);}}

.card {background: #ffffff; border: 1px solid #cbd5e1; border-radius: 16px; padding: 6px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); margin-bottom: 24px;}
.card:hover {box-shadow: 0 10px 15px -3px rgba(0,0,0,0.08); transition: .25s;}

/* ── Data sources panel ── */
.sources-header {font-size: 13px; font-weight: 700; color: #0f172a; text-transform: uppercase; letter-spacing: .6px; border-left: 3px solid #3b82f6; padding-left: 10px; margin-bottom: 16px;}
.src-table {width: 100%; border-collapse: separate; border-spacing: 0; border: 1px solid #e2e8f0; border-radius: 12px; overflow: hidden; background: #ffffff; margin-bottom: 24px; font-size: 13px;}
.src-table th {background: #f8fafc; padding: 12px 16px; text-align: left; color: #475569; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; border-bottom: 1px solid #e2e8f0;}
.src-table td {padding: 12px 16px; color: #334155; border-bottom: 1px solid #f1f5f9; vertical-align: middle;}
.src-table tr:last-child td {border-bottom: none;}
.src-table tr:hover td {background: #f8fafc;}
code {background: #f1f5f9; padding: 2px 7px; border-radius: 5px; font-size: 12px; color: #0f172a; font-family: monospace;}
.file-icon {margin-right: 6px;}
.fsize {color: #94a3b8; font-size: 12px; white-space: nowrap;}
.dl-link {color: #2563eb; text-decoration: none; font-weight: 500; font-size: 12px; padding: 4px 10px; background: #eff6ff; border-radius: 6px; border: 1px solid #bfdbfe; transition: all .2s;}
.dl-link:hover {background: #dbeafe;}

/* ── Pipeline diagram ── */
.pipeline-box {background: #ffffff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 20px 24px; margin-bottom: 20px;}
.pipeline-title {font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .6px; color: #64748b; margin-bottom: 16px;}
.pipeline-steps {display: flex; align-items: flex-start; gap: 8px; flex-wrap: wrap;}
.step {background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 14px 16px; flex: 1; min-width: 200px; font-size: 13px; color: #475569; line-height: 1.5;}
.step strong {display: block; color: #0f172a; margin-bottom: 4px; font-size: 13px;}
.step-num {display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px; background: #3b82f6; color: white; border-radius: 50%; font-size: 11px; font-weight: 700; margin-bottom: 8px;}
.step-arrow {color: #94a3b8; font-size: 20px; padding-top: 24px; flex: 0;}
.meta-row {display: flex; gap: 24px; flex-wrap: wrap; font-size: 12px; color: #64748b; padding: 12px 0; border-top: 1px solid #e2e8f0;}

/* ── Footer ── */
footer {text-align: center; padding: 16px; font-size: 12px; color: #94a3b8; border-top: 1px solid #e2e8f0; background: #ffffff; flex-shrink:0}

</style>
</head>
